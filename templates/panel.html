<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OKX 日线分析</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg:#0d1117; --bg-card:#161b22; --border:#30363d; --text:#e6edf3; --text2:#8b949e;
      --green:#3fb950; --red:#f85149; --blue:#58a6ff; --yellow:#d2991d; --purple:#a371f7;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}
    
    .topbar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .topbar-l{display:flex;align-items:center;gap:16px;}
    .topbar-l .brand{font-weight:700;font-size:.95rem;}
    .topbar-l .sym{font-size:.7rem;color:var(--text2);}
    .topbar-l a{color:var(--text2);text-decoration:none;font-size:.8rem;padding:4px 10px;border-radius:5px;transition:all .2s;}
    .topbar-l a:hover,.topbar-l a.active{color:var(--blue);background:rgba(88,166,255,.08);}
    .topbar-price{font-size:1.1rem;font-weight:700;color:var(--green);}

    .layout{display:flex;height:calc(100vh - 44px);}
    .main{flex:1;overflow-y:auto;padding:14px 16px 24px;min-width:0;}
    .sidebar{width:280px;min-width:260px;background:var(--bg-card);border-left:1px solid var(--border);overflow-y:auto;padding:14px;position:sticky;top:44px;height:calc(100vh - 44px);}
    .sidebar h3{font-size:.8rem;color:var(--text2);text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
    @media(max-width:800px){.layout{flex-direction:column;}.sidebar{width:100%;min-width:0;height:auto;position:static;border-left:none;border-top:1px solid var(--border);}}

    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
    .card-title{font-size:.75rem;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
    #chart{width:100%;height:300px;border-radius:8px;}

    .summary-text{font-size:.82rem;line-height:1.8;white-space:pre-wrap;padding:8px 0;}

    .signal-big{text-align:center;padding:20px 14px;border-radius:12px;border:2px solid var(--border);}
    .signal-big.long{border-color:rgba(63,185,80,.35);background:rgba(63,185,80,.04);}
    .signal-big.short{border-color:rgba(248,81,73,.35);background:rgba(248,81,73,.04);}
    .signal-big.hold{border-color:rgba(139,148,158,.25);}
    .sig-icon{font-size:2rem;margin-bottom:2px;}
    .sig-dir{font-size:1.3rem;font-weight:800;}
    .sig-dir.long{color:var(--green);}.sig-dir.short{color:var(--red);}.sig-dir.hold{color:var(--text2);}
    .sig-prices{display:flex;justify-content:center;gap:16px;margin-top:10px;font-size:.8rem;flex-wrap:wrap;}
    .sig-prices>div{display:flex;flex-direction:column;align-items:center;min-width:60px;}
    .sig-prices .lbl{color:var(--text2);font-size:.7rem;}
    .sig-prices .val{font-weight:700;font-size:.9rem;margin-top:1px;}
    .sig-meta{margin-top:8px;font-size:.74rem;color:var(--text2);display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}

    .phase-tag{display:inline-block;padding:3px 12px;border-radius:999px;font-size:.78rem;font-weight:700;margin-right:6px;}
    .phase-tag.bull{background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.25);}
    .phase-tag.bear{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.25);}
    .phase-tag.none{background:rgba(139,148,158,.1);color:var(--text2);border:1px solid rgba(139,148,158,.15);}
    .insight-box{background:rgba(163,113,247,.05);border:1px solid rgba(163,113,247,.18);border-radius:8px;padding:10px;margin-top:8px;}
    .insight-box .label{font-size:.7rem;color:var(--purple);}
    .insight-box .action{font-size:.88rem;font-weight:700;margin-top:3px;}
    .signals-list{font-size:.73rem;color:var(--text2);margin-top:6px;line-height:1.6;}

    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:.82rem;font-weight:700;font-family:inherit;transition:all .2s;}
    .btn-go{background:linear-gradient(135deg,#1f6feb,#238636);color:#fff;width:100%;justify-content:center;}
    .btn-go:hover{transform:translateY(-1px);filter:brightness(1.1);}
    .btn-go:disabled{opacity:.5;cursor:not-allowed;transform:none;filter:none;}
    .btn-save{background:linear-gradient(135deg,#238636,#1f6feb);color:#fff;width:100%;justify-content:center;margin-top:8px;}

    .sb-section{margin-bottom:14px;}
    .sb-section h4{font-size:.72rem;color:var(--blue);margin-bottom:6px;font-weight:600;}
    .sb-group{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;margin-bottom:8px;}
    .sb-item{display:flex;flex-direction:column;gap:1px;}
    .sb-item.single{grid-column:1/-1;}
    .sb-item label{font-size:.68rem;color:var(--text2);}
    .sb-item input,.sb-item select{padding:5px 7px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;font-family:inherit;font-size:.74rem;width:100%;}
    .sb-item input:focus{outline:none;border-color:var(--blue);}

    .toast{position:fixed;top:20px;right:20px;z-index:9999;padding:8px 18px;border-radius:7px;font-weight:600;font-size:.8rem;opacity:0;transform:translateX(40px);transition:all .3s;pointer-events:none;}
    .toast.show{opacity:1;transform:translateX(0);}
    .toast-ok{background:#238636;color:#fff;}.toast-err{background:#b62324;color:#fff;}
    .spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-l">
      <span class="brand">📊 OKX 日线分析</span>
      <a href="/" class="active">日线分析</a>
      <a href="/backtest">回测</a>
      <span class="sym" id="topbar-sym">—</span>
    </div>
    <div class="topbar-r">
      <span id="topbar-price" class="topbar-price">—</span>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <div class="layout">
    <div class="main">
      <div class="card" style="padding:8px;">
        <button class="btn btn-go" onclick="analyze()" id="btn-go">⚡ 分析日线</button>
      </div>

      <!-- 文本摘要 (始终可见) -->
      <div class="card" id="summary-card" style="display:none;">
        <div class="card-title">📋 分析摘要</div>
        <div class="summary-text" id="summary-text"></div>
      </div>

      <!-- K线图 -->
      <div class="card" id="chart-card" style="display:none;">
        <div class="card-title">📈 K线图 (近60日)</div>
        <div id="chart"></div>
      </div>

      <!-- 综合判断 -->
      <div class="card" id="sig-sec" style="display:none;">
        <div class="card-title">🎯 AI 综合判断</div>
        <div class="signal-big" id="sig-card">
          <div class="sig-icon" id="sig-icon">⏳</div>
          <div class="sig-dir hold" id="sig-dir">等待分析...</div>
          <div class="sig-prices" id="sig-prices"></div>
          <div class="sig-meta" id="sig-meta"></div>
        </div>
      </div>

      <!-- 庄家分析 -->
      <div class="card" id="manip-sec" style="display:none;">
        <div class="card-title">🧠 庄家分析</div>
        <div id="manip-content"></div>
      </div>

      <!-- 插针事件 -->
      <div class="card" id="wick-sec" style="display:none;">
        <div class="card-title">⚡ 插针检测（历史全部）</div>
        <div id="wick-content" style="font-size:.75rem;line-height:1.8;"></div>
      </div>

      <!-- 猎杀爆仓 -->
      <div class="card" id="hunt-sec" style="display:none;">
        <div class="card-title">💀 猎杀爆仓策略</div>
        <div id="hunt-content"></div>
      </div>

      <!-- 资金卫士 -->
      <div class="card" id="guard-sec" style="display:none;">
        <div class="card-title">🛡️ 资金卫士 · 阶梯入场方案</div>
        <div id="guard-content"></div>
      </div>
    </div>

    <!-- 侧边栏 -->
    <div class="sidebar">
      <h3>⚙️ 设置</h3>
      <div class="sb-section">
        <h4>📋 基础</h4>
        <div class="sb-item single" style="margin-bottom:6px;">
          <label>交易对</label>
          <input id="cfg-sym" placeholder="LAB-USDT-SWAP">
        </div>
        <div class="sb-group">
          <div class="sb-item"><label>日线回溯根数</label><input id="cfg-lookback" type="number" value="150" min="30" max="500"></div>
          <div class="sb-item"><label>影线阈值(倍)</label><input id="cfg-wick" type="number" value="3.0" step="0.1"></div>
        </div>
      </div>
      <div class="sb-section">
        <h4>🤖 AI 参数</h4>
        <div class="sb-group">
          <div class="sb-item"><label>温度(0.1~1)</label><input id="cfg-ai-temp" type="number" value="0.3" min="0.1" max="1" step="0.05"></div>
          <div class="sb-item"><label>最大Token</label><input id="cfg-ai-tokens" type="number" value="1500" min="500" max="4000"></div>
        </div>
        <div style="font-size:.65rem;color:var(--text2);margin-top:-4px;">
          最大Token = AI输出上限(≈字数×2)，越大回复越长但越慢
        </div>
      </div>
      <button class="btn btn-save" onclick="saveCfg()">💾 保存设置</button>
      <button class="btn btn-save" onclick="downloadJournal()" style="background:linear-gradient(135deg,#238636,#2ea043);margin-top:6px;">📥 下载交易跟踪表</button>
    </div>
  </div>

  <script>
    function toast(m,e){var t=document.getElementById("toast");t.textContent=m;t.className="toast toast-"+(e?"err":"ok")+" show";clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show")},2500);}

    var chartInst=null;
    function drawDailyChart(kd){
      if(!window.echarts||!kd||!kd.length)return;
      var times=kd.map(function(d){return d.time;});
      var ohlc=kd.map(function(d){return[d.open,d.close,d.low,d.high];});
      var dom=document.getElementById("chart");
      if(chartInst)chartInst.dispose();
      chartInst=echarts.init(dom,'dark');
      chartInst.setOption({
        backgroundColor:'transparent',tooltip:{trigger:"axis"},
        xAxis:{type:"category",data:times,axisLine:{lineStyle:{color:'#30363d'}},axisLabel:{color:'#8b949e',fontSize:9}},
        yAxis:{scale:true,axisLine:{lineStyle:{color:'#30363d'}},axisLabel:{color:'#8b949e',fontSize:9},splitLine:{lineStyle:{color:'#21262d'}}},
        grid:{left:44,right:10,top:8,bottom:22},
        series:[{type:"candlestick",data:ohlc,itemStyle:{color:'#3fb950',color0:'#f85149',borderColor:'#3fb950',borderColor0:'#f85149'}}]
      });
    }

    async function analyze(){
      var sym=(document.getElementById("cfg-sym").value||"").trim()||"LAB-USDT-SWAP";
      document.getElementById("topbar-sym").textContent=sym.replace("-SWAP","");
      var btn=document.getElementById("btn-go");btn.disabled=true;btn.innerHTML='<span class="spinner"></span> 分析中...';

      try{
        var r=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({symbol:sym})});
        var d=await r.json();
        if(d.error){toast("❌ "+d.error,true);return;}

        // 价格
        document.getElementById("topbar-price").textContent=Number(d.current_price||0).toFixed(6);

        // ── 文本摘要(始终显示) ──
        document.getElementById("summary-card").style.display="block";
        document.getElementById("summary-text").textContent=d.summary_cn||"无摘要";

        // ── K线图 ──
        if(d.kline&&d.kline.length){
          document.getElementById("chart-card").style.display="block";
          try{drawDailyChart(d.kline);}catch(e){console.error("图表:",e);}
        }

        // ── AI 综合判断 ──
        document.getElementById("sig-sec").style.display="block";
        var sig=d.signal||{};
        var dir=sig.direction||"neutral";
        var iconMap={long:"🟢",short:"🔴",neutral:"⚪"};
        var wordMap={long:"建议做多 ↗",short:"建议做空 ↘",neutral:"建议观望"};

        var card=document.getElementById("sig-card");
        card.className="signal-big "+(dir==="long"?"long":dir==="short"?"short":"hold");
        document.getElementById("sig-icon").textContent=iconMap[dir]||"⚪";
        var de=document.getElementById("sig-dir");
        de.textContent=wordMap[dir]||"方向不明";
        de.className="sig-dir "+(dir==="long"?"long":dir==="short"?"short":"hold");

        // 入场/止损/止盈
        var ph="";
        if(sig.entry)ph+='<div><span class="lbl">入场</span><span class="val">'+Number(sig.entry).toFixed(6)+'</span></div>';
        if(sig.stop_loss)ph+='<div><span class="lbl">止损</span><span class="val" style="color:var(--red)">'+Number(sig.stop_loss).toFixed(6)+'</span></div>';
        if(sig.take_profit1)ph+='<div><span class="lbl">止盈1</span><span class="val" style="color:var(--green)">'+Number(sig.take_profit1).toFixed(6)+'</span></div>';
        if(sig.take_profit2)ph+='<div><span class="lbl">止盈2</span><span class="val" style="color:var(--green)">'+Number(sig.take_profit2).toFixed(6)+'</span></div>';
        document.getElementById("sig-prices").innerHTML=ph;

        var mh='';
        if(sig.strength)mh+='强度 <b>'+(sig.strength==="strong"?"★★★":sig.strength==="medium"?"★★☆":"★☆☆")+'</b>';
        if(sig.market_state)mh+=' · <b>'+sig.market_state+'</b>';
        document.getElementById("sig-meta").innerHTML=mh;

        // ── 庄家分析 ──
        var manip=sig.manipulation||{}, phase=manip.phase_result||{};
        if(phase.phase_cn){
          document.getElementById("manip-sec").style.display="block";
          var pc=(phase.phase==="accumulation"||phase.phase==="markup"||phase.phase==="shakeout")?"bull":
                 (phase.phase==="distribution")?"bear":"none";
          var mp='<span class="phase-tag '+pc+'">📍 '+phase.phase_cn+'</span>';
          mp+='<span style="font-size:.73rem;color:var(--text2);">置信 '+(Number(phase.confidence||0)*100).toFixed(0)+'%</span>';
          if(phase.weighted_bull!==undefined){
            mp+='<div style="margin-top:6px;font-size:.73rem;color:var(--text2);">';
            mp+='多方 <b style="color:var(--green)">'+(Number(phase.weighted_bull||0)*100).toFixed(0)+'%</b> · ';
            mp+='空方 <b style="color:var(--red)">'+(Number(phase.weighted_bear||0)*100).toFixed(0)+'%</b></div>';
          }
          var nm=manip.next_move||{};
          if(nm.next_action){
            mp+='<div class="insight-box"><div class="label">🧠 预测下一步</div>';
            mp+='<div class="action">'+nm.next_action+'</div><div style="font-size:.73rem;color:var(--text2);margin-top:3px;">';
            if(nm.target_price)mp+='目标 <b>'+Number(nm.target_price).toFixed(6)+'</b> · ';
            if(nm.stop_price)mp+='止损 <b>'+Number(nm.stop_price).toFixed(6)+'</b>';
            mp+='</div></div>';
          }
          if(phase.signals&&phase.signals.length){
            mp+='<div class="signals-list">';
            for(var j=0;j<Math.min(phase.signals.length,8);j++)mp+='· '+phase.signals[j]+'<br>';
            mp+='</div>';
          }
          var wy=manip.wyckoff||{};
          if(wy.events&&wy.events.length){
            mp+='<div style="font-size:.73rem;color:var(--text2);margin-top:6px;">🏗 威科夫: '+wy.events.join('; ')+'</div>';
          }
          document.getElementById("manip-content").innerHTML=mp;
        }else{
          document.getElementById("manip-sec").style.display="none";
        }

        // ── 插针事件 ──
        var wicks=sig.wicks||[];
        document.getElementById("wick-sec").style.display="block";
        var wh='';
        if(wicks.length>0){
          wh+='<div style="display:flex;justify-content:space-between;margin-bottom:6px;color:var(--text2);font-size:.7rem;">';
          wh+='<span>共 '+wicks.length+' 次插针事件</span>';
          wh+='<span>🔻向下=洗盘 | 🔺向上=诱多</span></div>';
          for(var j=0;j<wicks.length;j++){
            var w=wicks[j], isDown=w.indexOf("向下")>=0||w.indexOf("洗盘")>=0;
            wh+='<div style="padding:4px 8px;margin:2px 0;border-radius:4px;font-size:.73rem;'+
                (isDown?'border-left:3px solid var(--red);background:rgba(248,81,73,.05);':
                        'border-left:3px solid var(--yellow);background:rgba(210,153,29,.05);')+'">'+
                (isDown?'🔻 ':'🔺 ')+w+'</div>';
          }
        }else{
          wh+='<div style="font-size:.78rem;color:var(--text2);padding:4px 0;">✅ 插针检测已执行，历史K线中未发现明显插针事件（影体比≥阈值）</div>';
        }
        document.getElementById("wick-content").innerHTML=wh;

        // ── 猎杀爆仓 ──
        var hunt=d.liquidation_hunt;
        document.getElementById("hunt-sec").style.display="block";
        var hh='';
        if(hunt&&hunt.mode!=="none"){
          var isLongHunt=hunt.mode==="hunt_longs";
          hh+='<div class="signal-big '+(isLongHunt?"long":"short")+'" style="padding:12px;">';
          hh+='<div style="font-size:1.1rem;font-weight:800;color:'+(isLongHunt?'var(--green)':'var(--red)')+';">💀 '+hunt.mode_cn+'</div>';
          hh+='<div style="font-size:.75rem;color:var(--text2);margin-top:4px;">多空比 <b>'+Number(hunt.ls_ratio||0).toFixed(2)+':1</b> | VWAP <b>'+Number(hunt.vwap||0).toFixed(6)+'</b></div>';
          // 爆仓瀑布区
          hh+='<div style="margin-top:8px;font-size:.73rem;">';
          var zones=hunt.liquidation_zones||[];
          var colors=isLongHunt?['#f85149','#ff7b72','#ffa28b']:['#3fb950','#56d364','#7ee787'];
          for(var j=0;j<zones.length;j++){
            var z=zones[j];
            var pctFromVwap=Math.abs((z.price-hunt.vwap)/hunt.vwap*100).toFixed(1);
            hh+='<div style="padding:4px 8px;margin:3px 0;border-radius:4px;border-left:3px solid '+colors[j]+';background:rgba(255,255,255,.03);text-align:left;">';
            hh+='<span style="color:'+colors[j]+';font-weight:700;">'+z.leverage+'x</span> ';
            hh+='<span>'+Number(z.price).toFixed(6)+'</span> ';
            hh+='<span style="color:var(--text2);">('+(isLongHunt?'↓':'↑')+pctFromVwap+'%)</span>';
            hh+='</div>';
          }
          hh+='</div>';
          // 交易计划
          hh+='<div class="sig-prices" style="margin-top:10px;">';
          hh+='<div><span class="lbl">挂单价</span><span class="val">'+Number(hunt.recommended_entry).toFixed(6)+'</span></div>';
          hh+='<div><span class="lbl">止损</span><span class="val" style="color:var(--red)">'+Number(hunt.stop_loss).toFixed(6)+'</span></div>';
          hh+='<div><span class="lbl">止盈</span><span class="val" style="color:var(--green)">'+Number(hunt.take_profit).toFixed(6)+'</span></div>';
          hh+='</div>';
          hh+='<div style="margin-top:6px;font-size:.75rem;color:'+(hunt.risk_reward_ratio>=2?'var(--green)':'var(--yellow)')+';">📊 盈亏比 1:'+Number(hunt.risk_reward_ratio||0).toFixed(1)+'</div>';
          hh+='</div>';
          hh+='<div style="font-size:.7rem;color:var(--text2);margin-top:6px;text-align:center;">⚠️ 此为辅助信号，需配合AI方向确认后谨慎执行</div>';
        }else{
          hh+='<div style="font-size:.78rem;color:var(--text2);padding:8px;text-align:center;">';
          hh+=(hunt&&hunt.summary)||'多空比正常，无极端拥挤，无需猎杀';
          hh+='</div>';
        }
        document.getElementById("hunt-content").innerHTML=hh;

        // ── 资金卫士 ──
        var cp=d.capital_plan;
        document.getElementById("guard-sec").style.display="block";
        var gh='';
        if(cp&&cp.direction!=="neutral"&&cp.phases&&cp.phases.length>=2){
          var safetyColor=cp.safety_level==="unreachable"?"var(--green)":cp.safety_level==="safe"?"var(--yellow)":"var(--red)";
          var safetyEmoji=cp.safety_level==="unreachable"?"✅":cp.safety_level==="safe"?"⚠️":"❌";
          gh+='<div class="signal-big '+(cp.direction==="long"?"long":"short")+'" style="padding:12px;">';
          gh+='<div style="font-size:1rem;font-weight:800;">🛡️ 阶梯入场方案</div>';
          gh+='<div style="font-size:.75rem;color:var(--text2);margin-top:4px;">';
          gh+='总资金 <b>$'+Number(cp.total_capital||0).toFixed(0)+'</b> | ';
          gh+='杠杆 <b>'+cp.leverage+'x</b> | ';
          gh+='分仓 <b>'+(Number(cp.trading_ratio||0)*100).toFixed(0)+'/'+(Number(cp.reserve_ratio||0)*100).toFixed(0)+'</b>';
          gh+='</div>';
          // 两个阶段
          gh+='<div style="margin-top:10px;font-size:.73rem;text-align:left;">';
          for(var k=0;k<cp.phases.length;k++){
            var ph=cp.phases[k];
            var isPhase1=ph.phase===1;
            gh+='<div style="padding:6px 10px;margin:4px 0;border-radius:6px;background:rgba(255,255,255,.04);border-left:3px solid '+(isPhase1?'var(--blue)':'var(--purple)')+';">';
            gh+='<div style="font-weight:700;color:'+(isPhase1?'var(--blue)':'var(--purple)')+';">📌 '+ph.label+'</div>';
            gh+='<div style="margin-top:2px;">入场价 <b>'+Number(ph.entry_price).toFixed(6)+'</b></div>';
            gh+='<div>保证金 <b>$'+Number(ph.capital).toFixed(0)+'</b> | 名义仓位 <b>$'+Number(ph.notional).toFixed(0)+'</b></div>';
            gh+='<div style="color:var(--red);">独立爆仓 <b>'+Number(ph.independent_liq).toFixed(6)+'</b></div>';
            gh+='</div>';
          }
          gh+='</div>';
          // 联合爆仓 & 安全评估
          gh+='<div style="margin-top:10px;padding:10px;border-radius:8px;background:rgba(255,255,255,.05);">';
          gh+='<div style="font-size:.78rem;">📊 加权入场 <b>'+Number(cp.weighted_entry).toFixed(6)+'</b></div>';
          gh+='<div style="font-size:.78rem;color:var(--red);">💥 联合爆仓价 <b>'+Number(cp.combined_liquidation).toFixed(6)+'</b></div>';
          gh+='<div style="font-size:.9rem;font-weight:800;color:'+safetyColor+';margin-top:4px;">';
          gh+=safetyEmoji+' 安全距离 <b>'+Number(cp.safety_distance_pct).toFixed(1)+'%</b>';
          if(cp.safety_level==="unreachable")gh+=' — 不可触及';
          else if(cp.safety_level==="safe")gh+=' — 较安全';
          else gh+=' — 危险';
          gh+='</div>';
          gh+='</div>';
          gh+='</div>';
          if(cp.summary){
            gh+='<div style="font-size:.72rem;color:var(--text2);margin-top:6px;white-space:pre-wrap;line-height:1.6;">'+cp.summary.replace(/\n/g,'<br>')+'</div>';
          }
        }else if(cp&&cp.direction==="neutral"){
          gh+='<div style="font-size:.78rem;color:var(--text2);padding:8px;text-align:center;">AI 方向为观望，无需资金方案</div>';
        }else{
          gh+='<div style="font-size:.78rem;color:var(--text2);padding:8px;text-align:center;">暂无资金卫士数据</div>';
        }
        document.getElementById("guard-content").innerHTML=gh;

        toast("✅ 分析完成",false);
      }catch(e){toast("❌ "+e.message,true);console.error(e);}
      finally{btn.disabled=false;btn.innerHTML='⚡ 分析昨日日线';}
    }

    async function saveCfg(){
      var payload={
        SYMBOLS:document.getElementById("cfg-sym").value.trim(),
        DAILY_LOOKBACK:Number(document.getElementById("cfg-lookback").value),
        WICK_SHADOW_RATIO:Number(document.getElementById("cfg-wick").value),
        AI_TEMPERATURE:Number(document.getElementById("cfg-ai-temp").value),
        AI_MAX_TOKENS:Number(document.getElementById("cfg-ai-tokens").value),
        ADVANCED_INDICATORS:document.getElementById("cfg-adv-ind")?document.getElementById("cfg-adv-ind").checked:true,
      };
      try{
        await fetch("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
        toast("✅ 设置已保存",false);
      }catch(e){toast("保存失败",true);}
    }

    function downloadJournal(){
      window.open("/api/export/trade-journal", "_blank");
    }

    // 初始化加载配置
    (async function(){
      try{
        var r=await fetch("/api/config");var d=await r.json();
        var s=function(id,v){var el=document.getElementById(id);if(el&&v!==undefined){if(typeof v==="boolean")el.checked=v;else el.value=v;}};
        if(d.SYMBOLS&&d.SYMBOLS.length)s("cfg-sym",d.SYMBOLS[0]);
        s("cfg-lookback",d.DAILY_LOOKBACK||150);
        s("cfg-wick",d.WICK_SHADOW_RATIO||3.0);
        s("cfg-ai-temp",d.AI_TEMPERATURE||0.3);
        s("cfg-ai-tokens",d.AI_MAX_TOKENS||1500);
      }catch(e){}
    })();
  </script>
</body>
</html>
